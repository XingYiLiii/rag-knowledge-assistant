{% extends "base.html" %}

{% block title %}知识库详情 | RAG 知识库助手{% endblock %}
{% block page %}knowledge-base-detail{% endblock %}

{% block content %}
  <a class="back-link" href="/">← 返回全部知识库</a>
  <section class="page-heading" data-knowledge-base-id="{{ knowledge_base_id }}">
    <div>
      <p class="eyebrow">知识库</p>
      <h1 id="knowledge-base-name">加载中…</h1>
      <p id="knowledge-base-description" class="muted"></p>
    </div>
  </section>

  <section class="card" aria-labelledby="upload-heading">
    <h2 id="upload-heading">上传文档</h2>
    <p class="muted">支持格式：PDF、DOCX、Markdown、TXT。</p>
    <form id="upload-document-form" class="inline-form">
      <input id="document-file" name="file" type="file" accept=".pdf,.docx,.md,.txt" required>
      <button type="submit">上传并建立索引</button>
    </form>
  </section>

  <section aria-labelledby="documents-heading">
    <div class="section-heading">
      <h2 id="documents-heading">文档</h2>
      <button id="refresh-documents" class="button-secondary" type="button">刷新</button>
    </div>
    <p id="page-message" class="page-message" role="status"></p>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>文件</th>
            <th>类型</th>
            <th>状态</th>
            <th>切片数</th>
            <th>错误信息</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="document-list" aria-live="polite"></tbody>
      </table>
    </div>
  </section>
{% endblock %}

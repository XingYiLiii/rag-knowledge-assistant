<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}RAG 知识库助手{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
  </head>
  <body data-page="{% block page %}{% endblock %}">
    <header class="site-header">
      <div class="shell header-content">
        <a class="brand" href="/">RAG 知识库助手</a>
        <nav class="site-nav" aria-label="主导航">
          <a href="/">知识库</a>
          <a href="/chat">智能问答</a>
          <a href="/history">对话历史</a>
        </nav>
      </div>
    </header>
    <main class="shell">{% block content %}{% endblock %}</main>
    <script src="{{ url_for('static', path='app.js') }}" defer></script>
  </body>
</html>

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: production
      DATABASE_URL: sqlite:////app/data/sqlite/rag_knowledge_assistant.db
      UPLOAD_DIRECTORY: /app/data/uploads
      CHROMA_PERSIST_DIRECTORY: /app/data/chroma
    volumes:
      - sqlite_data:/app/data/sqlite
      - uploads_data:/app/data/uploads
      - chroma_data:/app/data/chroma
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  sqlite_data:
  uploads_data:
  chroma_data:
